<!DOCTYPE html>
<html lang="cs">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link type="text/css" rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="images/icon.png" />
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <title>Telefon</title>
</head>

<body>
  <div class="phone">


    <div class="statusbar">
      <span id="time">12:00</span>
      <div class="statusbar-icons">
        <span style="font-size: 10px;" class="material-icons">signal_cellular_4_bar</span>
        <span style="font-size: 10px;" class="material-icons">wifi</span>
        <span style="font-size: 10px;" class="material-icons">battery_std</span>
      </div>
    </div>

    <div id="header" class="header">Authenticator</div>

    <div id="app-content" class="app-content">
      <div id="account-list" class="account-list">

      </div>

      <div id="scan-screen" class="scan-screen hidden" tabindex="0">
        <div class="scan-overlay">
          <div class="scan-frame">
            <img id="qr-image" src="" alt="">
            <div id="qr-overlay-text">Align QR code within frame</div>
          </div>
        </div>

        <div class="scan-footer">
          <button id="manual-code-btn" class="primary-btn">
            Enter code manually
          </button>
        </div>
      </div>
    </div>

    <!-- Floating QR tlačítko -->
    <button id="add-account-btn" class="fab">
      <span class="material-icons">qr_code_scanner</span>
    </button>
