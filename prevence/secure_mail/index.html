<!doctype html>
<html lang="cs">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" type="image/png" href="images/icon.png" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>SecureMail</title>
</head>

<body>
  <header>
    <div class="logo">SecureMail</div>
  </header>

  <div class="app">
    <aside class="sidebar">
      <div class="folders">
        <div class="folder active" data-folder="inbox">Doručená pošta</div>
        <div class="folder" data-folder="spam">Spam</div>
        <button class="btn" new-mail-button><span class="material-icons">create</span>Nová zpráva</button>
        <!-- nic nedělá, jen se to tam hodí -->
      </div>
    </aside>

    <main class="content" id="content">
      <!-- hlavní okno kam se vykreslí buď seznam emailů nebo detail zprávy -->
    </main>
  </div>

  <footer>Přihlášený uživatel: <strong>Jan Srnka</strong> (johndoe@gmail.com)</footer>

  <!-- veškeré obsahy e-mailů a obsluha akcí s nimi spojených je v následujícím skriptu -->
  <script src="script.js"></script>
</body>

</html>
