<html lang="cs">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" type="image/png" href="images/icon.png" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  
  <title>SecureMail</title>
  <style>

    * {
      box-sizing: border-box
    }

    body {
      font-family: Inter, Arial, sans-serif;
      margin: auto;
      background: #f5f7fb;
      color: #111
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e3e6ea;
      padding: 10px 16px;
      display: flex;
      align-items: center
    }

    .logo {
      font-weight: 700;
      color: #1d4ed8;
      font-size: 18px
    }

    .banner {
      margin-left: auto;
      background: #ffdddd;
      color: #7a0000;
      padding: 6px 10px;
      border-left: 6px solid #ff5c5c;
      font-weight: 600
    }

    .app {
      display: grid;
      grid-template-columns: 260px 1fr;
      height: calc(100vh - 80px)
    }

    .sidebar {
      background: #fff;
      border-right: 1px solid #e3e6ea;
      display: flex;
      flex-direction: column;
      gap:30px;
    }

    .folders {
      padding: 12px;
      border-bottom: 1px solid #e3e6ea
    }

    .folder {
      padding: 10px;
      margin-bottom: 16px;
      border-radius: 6px;
      cursor: pointer
    }

    .folder:hover {
      background: #eef6ff
    }

    .folder.active {
      background: #dbeafe;
      color: #1d4ed8;
      font-weight: 600
    }

    /* content area */
    .content {
      padding: 14px;
      overflow: auto
    }

    .list-view .email-item {
      background: #fff;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid #edf2f7
    }

    .email-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(16, 24, 40, 0.04)
    }

    .subject {
      font-weight: 700;
      margin-bottom: 10px
    }

    .meta {
      font-size: 13px;
      color: #6b7280;
      display: flex;
      justify-content: space-between
    }

    .snippet {
      color: #374151;
      margin-top: 8px
    }

    /* message view */
    .message-card {
      background: #fff;
      border-radius: 8px;
      padding: 16px;
      border: 1px solid #edf2f7
    }

    .message-header {
      /*display: flex;*/
      align-items: center;
      margin-bottom: 12px;
    }

    .gmail-header {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      margin-top: 24px;
      margin-bottom: 16px
    }

    .gmail-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #dbeafe;
      color: #1d4ed8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 15px;
      flex-shrink: 0;
    }

    .gmail-meta {
      flex: 1;
      min-width: 0
    }

    .gmail-from-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap
    }

    .gmail-from {
      font-size: 16px;
      color: #6b7280;
      font-size: 13px
    }

    .gmail-name {
      font-size: 16px;
      font-weight: 700
    }

    .gmail-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px
    }

    .gmail-time {
      font-size: 13px
    }

    .gmail-recipient {
      margin-top: 2px;
      color: #6b7280;
      font-size: 13px
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: #fff;
      cursor: pointer;
       color: #6b7280;
      border-style: none;
      align-self: top;
    }

    .back-btn:hover {
      background: #f0f6ff
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;

      padding: 8px 12px;
      border-radius: 6px;
      background:#1d4ed8;
      color: #fff;
      text-decoration: none;
      border-style: none;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }

    footer {
      padding: 10px;
      text-align: center;
      background: #fff;
      border-top: 1px solid #e3e6ea;
      font-size: 13px;
      color: #6b7280
    }

    /* ===== Gmail-like thread ===== */

.thread-item {
  background: #fff;
  border: 1px solid #edf2f7;
  border-radius: 8px;
  overflow: hidden;
}

.thread-header {
  display: flex;
  gap: 12px;
  padding: 16px;
  cursor: pointer;
  transition: background 0.15s ease;
}

.thread-header:hover {
  background: #f9fafb;
}

.thread-body {
  padding: 16px 16px 16px 68px;
  display: none;
  border-top: 1px solid #edf2f7;
}

.thread-item.open .thread-body {
  display: block;
}

.thread-item.open .expand-icon {
  transform: rotate(180deg);
}

.expand-icon {
  font-size: 18px;
  color: #6b7280;
  transition: transform 0.2s ease;
}


    @media (max-width:800px) {
      .app {
        grid-template-columns: 1fr
      }

      .sidebar {
        order: 2;
        border-right: 0;
        border-top: 1px solid #e3e6ea
      }
    }

  </style>

      content.innerHTML = html;

      const back = document.getElementById('backBtn');

      }

    }

      const info = spamInfo[messageId];

      if (!info) {
        document.getElementById('backFromResult').addEventListener('click', () => renderList());

      content.innerHTML = `

      </div>
      ${info.details}

  `;

      document.getElementById('backFromResult').addEventListener('click', () => renderList());
    }

    /* utility: basic HTML escape */
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
    }
