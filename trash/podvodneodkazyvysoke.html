<!DOCTYPE html>
<html lang="cs">

<head>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detekce podvodných odkazů | VUT</title>
    <style>
        @font-face {
            font-family: 'VafleVUT';
            src: url('./fonts/VAFLE_VUT_LIGHT.OTF') format('opentype');
            font-weight: 300;
            font-style: normal;
        }

        @font-face {
            font-family: 'VafleVUT';
            src: url('./fonts/VAFLE_VUT_REGULAR.OTF') format('opentype');
            font-weight: 400;
            font-style: normal;
        }

        @font-face {
            font-family: 'VafleVUT';
            src: url('./fonts/VAFLE_VUT_BOLD.OTF') format('opentype');
            font-weight: 700;
            font-style: normal;
        }

        :root {
            --bg-color: #f0f2f5;
            /* Chladnější technická šedá */
            --card-bg: #ffffff;
            --text-color: #1a1a1a;
            /* Temnější černá pro vyšší kontrast */
            --primary: #E50000;
            /* VUT Červená */
            --primary-hover: #CC0000;
            --success: #27ae60;
            --danger: #E50000;
            /* Použití VUT červené i pro chyby */
            --border-radius: 4px;
            /* Ostřejší rohy pro techničtější vzhled */
        }

        body {
            font-family: 'VafleVUT', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0px;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            max-width: 650px;
            width: 100%;
            text-align: center;
            border-top: 5px solid var(--primary);
        }


        h1 {
            color: var(--text-color);
            margin-bottom: 10px;
            font-size: 26px;
            font-weight: 700;
        }

        .instructions {
            color: #555;
            margin-bottom: 25px;
            font-size: 16px;
            line-height: 1.6;
            font-weight: 300;
        }

        .score-board {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            font-weight: 700;
            font-size: 15px;
            background: #f8f9fa;
            color: var(--primary);
            padding: 12px;
            border-radius: var(--border-radius);
            border: 1px solid #eaeaea;
        }

        .url-box {
            background-color: #fafafa;
            border: 2px solid #eaeaea;
            border-left: 4px solid var(--primary);
            border-radius: var(--border-radius);
            padding: 25px;
            margin-bottom: 25px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 0.5px;
            color: #000;
            word-break: break-all;
        }

        /* Nový kontejner pro dvě zóny */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            /* Mezera mezi bezpečnou a podvodnou zónou */
            margin-bottom: 25px;
        }

        /* 1. Bezpečná zóna (plná šířka) */
        .ok-option-row {
            width: 100%;
        }

        /* 2. Podvodná zóna (kompaktní 2x2 grid) */
        .fraud-options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        @media (max-width: 480px) {
            .fraud-options-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Základní styl pro kompaktní vertikální tlačítko */
        .option-btn {
            background-color: #fff;
            border: 1px solid #e0e0e0;
            padding: 12px 8px;
            /* Zmenšené padding */
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            /* Vertikální zarovnání */
            align-items: center;
            text-align: center;
            gap: 6px;
            /* Mezera mezi ikonou a textem */
            color: #444;
            border-radius: var(--border-radius);
            width: 100%;
            box-sizing: border-box;
        }

        .option-btn .material-symbols-outlined {
            font-size: 24px;
            /* Kompaktní ikona */
            color: #777;
        }

        .option-btn small {
            font-weight: 400;
            font-size: 10px;
            color: #999;
            text-transform: uppercase;
        }

        /* Vizuální odlišení bezpečné zóny na hover */
        .option-btn.option-ok:hover:not(:disabled) {
            border-color: #27ae60;
            /* Zelená pro OK */
            background-color: #f0fff4;
        }

        .option-btn.option-ok:hover:not(:disabled) .material-symbols-outlined {
            color: #27ae60;
        }

        /* Vizuální odlišení podvodné zóny na hover */
        .option-btn:not(.option-ok):hover:not(:disabled) {
            border-color: var(--primary);
            /* Červená pro podvody */
            background-color: #fffafa;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .option-btn:not(.option-ok):hover:not(:disabled) .material-symbols-outlined {
            color: var(--primary);
        }

        .feedback {
            margin-top: 20px;
            font-weight: 400;
            padding: 18px;
            border-radius: var(--border-radius);
            display: none;
            text-align: left;
            font-size: 15px;
            line-height: 1.6;
        }

        .feedback strong {
            font-family: 'VafleVUT', sans-serif;
            font-weight: 700;
            font-size: 18px;
            display: block;
            margin-bottom: 5px;
        }

        .feedback.success {
            display: block;
            background-color: #f0fdf4;
            color: #166534;
            border-left: 5px solid var(--success);
        }

        .feedback.error {
            display: block;
            background-color: #fef2f2;
            color: #991b1b;
            border-left: 5px solid var(--danger);
        }

        .next-btn {
            margin-top: 20px;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 16px 25px;
            font-size: 18px;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-family: 'VafleVUT', sans-serif;
            font-weight: 700;
            width: 100%;
            display: none;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .next-btn:hover {
            background-color: var(--primary-hover);
        }

        .next-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>

    <div class="container">


        <h1>Detekce podvodných odkazů</h1>
        <p class="instructions">
            Prohlédněte si níže uvedenou URL adresu a rozhodněte, o jaký typ odkazu se jedná. Kliknutím na příslušnou
            kategorii ověříte svůj tip.
        </p>

        <div class="score-board">
            <span id="level-display">Postup: 1 / 9</span>
        </div>

        <div class="url-box" id="url-display">Nahrávám...</div>

        <div class="options-container" id="options-container">
            <div class="ok-option-row">
                <button class="option-btn option-ok" data-category="ok">
                    <span class="material-symbols-outlined">check_circle</span>
                    <span>V pořádku</span>
                    <small>Legitimní web</small>
                </button>
            </div>

            <div class="fraud-options-grid">
                <button class="option-btn" data-category="typo">
                    <span class="material-symbols-outlined">spellcheck</span>
                    <span>Překlep</span>
                    <small>ZÁMĚNA ZNAKŮ</small>
                </button>

                <button class="option-btn" data-category="domain">
                    <span class="material-symbols-outlined">public_off</span>
                    <span>Podvodná doména</span>
                    <small>CIZÍ ADRESA</small>
                </button>

                <button class="option-btn" data-category="shortener">
                    <span class="material-symbols-outlined">link_off</span>
                    <span>Zkracovač</span>
                    <small>SKRYTÝ CÍL</small>
                </button>

                <button class="option-btn" data-category="malware">
                    <span class="material-symbols-outlined">bug_report</span>
                    <span>Malware</span>
                    <small>ŠKODLIVÝ SOUBOR</small>
                </button>
            </div>
        </div>

        <div class="feedback" id="feedback"></div>
        <button class="next-btn" id="next-btn">Další adresa</button>
    </div>

    <script>
        const levels = [
            {

            {

            },

            },
            {
                url: "bit.ly/vut-stipendium-2024",

                tip: "Zkracovače v oficiálních e-mailech z VUT nečekejte. Nikdy nevíte, kam vás takový odkaz skutečně přesměruje."
            },
            {
                url: "ls.vut.cz",
                category: "typo",
                tip: "Záměna malého 'L' za velké 'I'. V adresním řádku vypadá 'ls' (jako IS) téměř identicky."
            },

                category: "malware",
                tip: "Zneužití důvěryhodné služby. Útočník nahrál virus na veřejný cloud Googlu. Adresa neobsahuje podvodnou doménu a snadno oklame i filtry."
            },
            {
                url: "vut-mail.cz",
                category: "domain",
                tip: "Podvodná doména. VUT používá pro poštu doménu vut.cz, nikoliv verze s pomlčkami a jinou koncovkou."
            },
            {
                url: "vut.cz/login",
                category: "ok",
                tip: "Naprosto legitimní cesta k přihlášení na hlavní doméně univerzity."
            },
            {
                url: "is.vut.cz@prihlaseni-student.com/login",
                category: "domain",
                tip: "Trik se zavináčem (Basic Auth). Vše před zavináčem prohlížeč ignoruje jako uživatelské jméno. Skutečná doména je až 'prihlaseni-student.com'."
            },
            {
                url: "vut.cz.security-update.net",
                category: "domain",
                tip: "Skutečným vlastníkem webu je 'security-update.net'. Část 'vut.cz' na začátku má jen vyvolat falešný pocit bezpečí."
            },
            {
                url: "intra.vut.cz---------prihlaseni.com",
                category: "domain",
                tip: "Tzv. URL padding. Pomlčky mají za úkol odsunout skutečnou doménu (.com) mimo viditelnou část prohlížeče, zejména na mobilu."
            },
            {
                url: "vut.cz/logout?redirect=http://zla-domena.cz/login",
                category: "domain",
                tip: "Tzv. Open Redirect. Odkaz začíná na správné doméně, ale po kliknutí vás automaticky přesměruje na podvodnou stránku."
            },
            {
                url: "vut-office365.online",
                category: "domain",
                tip: "VUT sice Office 365 používá, ale přihlášení probíhá vždy přes univerzitní brány. Doména .online je u VUT podezřelá."
            },
            {
                url: "tinyurl.com/vut-heslo-reset",
                category: "shortener",
                tip: "Další zkracovač. Útočníci je milují, protože maskují cílovou phishingovou stránku."
            },
            {
                url: "id.vut.cz",
                category: "ok",
                tip: "Tohle je v pořádku. Jedná se o oficiální centrální autentizační službu VUT."
            },
            {
                url: "vnt.cz",
                category: "typo",
                tip: "Všimněte si písmene 'n' místo 'u'. Optický klam, který v rychlosti snadno přehlédnete."
            },
            {
                url: "is.vut.cz.potvrzeni-studia.com",
                category: "domain",
                tip: "Klasický podvod. Skutečná doména je 'potvrzeni-studia.com'. To, že je na začátku 'is.vut.cz', je jen trik se subdoménou."
            },
            {
                url: "vutbr.cz",
                category: "ok",
                tip: "V pořádku. VUT oficiálně používá i tuto kratší doménu (často pro weby fakult nebo hlavní rozcestník)."
            },
            {
                url: "bit.ly/vut-stipendium-2024",
                category: "shortener",
                tip: "Zkracovače v oficiálních e-mailech z VUT nečekejte. Nikdy nevíte, kam vás takový odkaz skutečně přesměruje."
            },
            {
                url: "ls.vut.cz",
                category: "typo",
                tip: "Záměna malého 'L' za velké 'I'. V adresním řádku vypadá 'ls' (jako IS) téměř identicky."
            },
            {
                url: "vut-mail.cz",
                category: "domain",
                tip: "Podvodná doména. VUT používá pro poštu doménu vut.cz, nikoliv verze s pomlčkami a jinou koncovkou."
            },
            {
                url: "vut.cz/login",
                category: "ok",
                tip: "Naprosto legitimní cesta k přihlášení na hlavní doméně univerzity."
            },
            {
                url: "vut.cz.security-update.net",
                category: "domain",
                tip: "Skutečným vlastníkem webu je 'security-update.net'. Část 'vut.cz' na začátku má jen vyvolat falešný pocit bezpečí."
            },
            {
                url: "intra.vut.cz---------prihlaseni.com",
                category: "domain",
                tip: "Tzv. URL padding. Pomlčky mají za úkol odsunout skutečnou doménu (.com) mimo viditelnou část prohlížeče, zejména na mobilu."
            },
            {
                url: "vut-office365.online",
                category: "domain",
                tip: "VUT sice Office 365 používá, ale přihlášení probíhá vždy přes univerzitní brány. Doména .online je u VUT podezřelá."
            },
            {
                url: "tinyurl.com/vut-heslo-reset",
                category: "shortener",
                tip: "Další zkracovač. Útočníci je milují, protože maskují cílovou phishingovou stránku."
            },
            {
                url: "rnicrosoft.com",
                category: "typo",
                tip: "Klasický typosquatting. Znaky 'r' a 'n' napsané těsně vedle sebe opticky napodobují písmeno 'm'."
            },
            {
                url: "postaonline-cz.com",
                category: "domain",
                tip: "Tohle je podvodná doména. Oficiální pošta používá doménu postaonline.cz (bez pomlčky a s koncovkou .cz)."
            },
            {
                url: "seznam.cz",
                category: "ok",
                tip: "Tato adresa je naprosto v pořádku."
            },
            {
                url: "tinyurl.com/mironet-sleva",
                category: "shortener",
                tip: "Zkracovače adres sice šetří místo, ale ve firemním e-mailu jsou nebezpečné, protože schovávají skutečný cíl odkazu. Více se o nich dozvíte v dalším úkolu."
            },
            {
                url: "idnes.cz.overeni-prihlaseni.com",
                category: "domain",
                tip: "Tohle je finta s klamavou subdoménou. Lidé čtou zleva doprava a vidí 'idnes.cz', ale skutečná doména je až část před koncem: 'overeni-prihlaseni.com'."
            },
            {
                url: "googIe.com",
                category: "typo",
                tip: "Místo malého 'l' (el) bylo v názvu použito velké 'I' (i). Častý trik u známých značek."
            },
            {
                url: "netflix-platba.com",
                category: "domain",
                tip: "Technika zvaná Combosquatting. Útočník vezme známé jméno a přidá k němu slovo jako 'platba' nebo 'podpora', aby vyvolal důvěru."
            },
            {
                url: "https://google.com/bit.ly/login",
                category: "shortener",
                tip: "Toto už tak jednoduché nebylo, stále je ale třeba pamatovat, že hlavní doména se nachází v poslední části URL a je tedy schovaná za zkracovačem."
            },
            {
                url: "csob-overeni.online",
                category: "domain",
                tip: "Banka by nikdy nepoužila pro své kritické systémy podivnou koncovku jako .online. Vždy si hlídá svou hlavní doménu."
            },
            {
                url: "csob.cz-----------login.com",
                category: "domain",
                tip: "Tzv. URL padding. Na mobilu se díky pomlčkám schová skutečná doména (.com) a uživatel vidí jen csob.cz na začátku."
            }
        ];

        let answered = false;
        let levelQueue = levels.map((_, i) => i);
        let currentQueuePosition = 0;

        const urlDisplayEl = document.getElementById('url-display');
        const feedbackEl = document.getElementById('feedback');
        const levelDisplayEl = document.getElementById('level-display');
        const nextBtn = document.getElementById('next-btn');
        const optionButtons = document.querySelectorAll('.option-btn');

        function loadLevel() {
            answered = false;
            feedbackEl.className = 'feedback';
            feedbackEl.innerText = '';
            nextBtn.style.display = 'none';

            levelDisplayEl.innerText = `Postup: ${currentQueuePosition + 1} / ${levelQueue.length}`;

            const levelIndex = levelQueue[currentQueuePosition];
            const level = levels[levelIndex];
            urlDisplayEl.innerText = level.url;

            // Změna: Teď vybíráme tlačítka uvnitř options-container
            const allButtons = document.querySelectorAll('#options-container .option-btn');
            allButtons.forEach(btn => {
                btn.className = btn.classList.contains('option-ok') ? 'option-btn option-ok' : 'option-btn';
                btn.disabled = false;
                // Obnovit barvu sub-textu
                btn.querySelector('small').style.color = '#999';
            });
        }

        optionButtons.forEach(button => {
            button.addEventListener('click', () => {
                if (answered) return;

                answered = true;
                const selectedCategory = button.getAttribute('data-category');
                const levelIndex = levelQueue[currentQueuePosition];
                const level = levels[levelIndex];

                optionButtons.forEach(btn => btn.disabled = true);

                if (selectedCategory === level.category) {
                    button.classList.add('correct');
                    button.querySelector('small').style.color = 'inherit';
                    feedbackEl.className = 'feedback success';
                    feedbackEl.innerHTML = `<strong>Správně!</strong>${level.tip}`;
                } else {
                    levelQueue.push(levelIndex);

                    button.classList.add('wrong');
                    button.querySelector('small').style.color = 'inherit';

                    optionButtons.forEach(btn => {
                        if (btn.getAttribute('data-category') === level.category) {
                            btn.classList.add('correct');
                            btn.querySelector('small').style.color = 'inherit';
                        }
                    });

                    feedbackEl.className = 'feedback error';
                    feedbackEl.innerHTML = `<strong>To nebylo správně.</strong>${level.tip}`;
                }

                nextBtn.style.display = 'block';

                if (currentQueuePosition + 1 === levelQueue.length) {
                    nextBtn.innerText = "Dokončit školení";
                } else {
                    nextBtn.innerText = "Další adresa";
                }
            });
        });

        nextBtn.onclick = () => {
            currentQueuePosition++;
            if (currentQueuePosition < levelQueue.length) {
                loadLevel();
            } else {
                // Změna: Schováme celý kontejner možností
                document.getElementById('options-container').style.display = 'none';
                urlDisplayEl.style.display = 'none';
                nextBtn.style.display = 'none';

                feedbackEl.className = 'feedback success';
                feedbackEl.style.display = 'block';
                feedbackEl.innerHTML = `<strong>Výborně!</strong> Podařilo se Vám odhalit všechny typy podvodných odkazů.<br><br>FLAG(NaOdkazSeNenachytam)`;
                levelDisplayEl.innerText = "Trénink dokončen!";
            }
        };

        loadLevel();
    </script>

</body>

</html>
