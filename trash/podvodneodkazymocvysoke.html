<!DOCTYPE html>
<html lang="cs">
<head>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detekce podvodných odkazů | VUT</title>
    <style>
        /* --- FONT DEFINITIONS --- */
        @font-face { font-family: 'VafleVUT'; src: url('./fonts/VAFLE_VUT_LIGHT.OTF') format('opentype'); font-weight: 300; }
        @font-face { font-family: 'VafleVUT'; src: url('./fonts/VAFLE_VUT_REGULAR.OTF') format('opentype'); font-weight: 400; }
        @font-face { font-family: 'VafleVUT'; src: url('./fonts/VAFLE_VUT_BOLD.OTF') format('opentype'); font-weight: 700; }

        :root {
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --text-color: #1a1a1a;
            --primary: #E50000; /* VUT Red */
            --primary-hover: #CC0000;
            --success: #27ae60;
            --success-light: #f0fdf4;
            --danger-light: #fef2f2;
            --border-radius: 6px;
        }

        body {
            font-family: 'VafleVUT', 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 35px;
            border-radius: var(--border-radius);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
            border-top: 6px solid var(--primary);
        }

        h1 { font-size: 24px; margin-bottom: 8px; font-weight: 700; }
        .instructions { color: #666; margin-bottom: 20px; font-size: 15px; font-weight: 300; line-height: 1.5; }

        .score-board {
            display: inline-block;
            margin-bottom: 20px;
            font-weight: 700;
            font-size: 13px;
            background: #eee;
            padding: 6px 15px;
            border-radius: 20px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* URL DISPLAY */
        .url-box {
            background-color: #f9f9f9;
            border: 2px dashed #ddd;
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 30px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 19px;
            color: #000;
            word-break: break-all;
            transition: all 0.3s ease;
        }

        /* BUTTONS LAYOUT */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .section-label {
            font-size: 12px;
            font-weight: 700;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .section-label::after { content: ""; flex: 1; height: 1px; background: #eee; }

        .fraud-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* BUTTON STYLE */
        .option-btn {
            background-color: #fff;
            border: 1px solid #e2e8f0;
            padding: 16px 10px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            border-radius: var(--border-radius);
            width: 100%;
        }

        .option-btn .material-symbols-outlined { font-size: 28px; color: #64748b; }
        .option-btn span { font-weight: 600; font-size: 14px; color: #334155; }
        .option-btn small { font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: 400; }

        /* SAFE BUTTON SPECIFIC */
        .option-ok { border-bottom: 3px solid #e2e8f0; }
        .option-ok:hover:not(:disabled) { 
            background-color: var(--success-light); 
            border-color: var(--success);
            transform: translateY(-2px);
        }

        /* FRAUD BUTTONS SPECIFIC */
        .option-btn:not(.option-ok):hover:not(:disabled) {
            border-color: var(--primary);
            background-color: var(--danger-light);
            transform: translateY(-2px);
        }

        /* FEEDBACK STATES */
        .option-btn.correct {
            background-color: var(--success) !important;
            border-color: var(--success) !important;
        }
        .option-btn.correct * { color: white !important; }

        .option-btn.wrong {
            background-color: var(--primary) !important;
            border-color: var(--primary) !important;
        }
        .option-btn.wrong * { color: white !important; }

        .option-btn:disabled { cursor: default; opacity: 0.6; transform: none !important; }

        /* FEEDBACK BOX */
        .feedback {
            margin-top: 25px;
            padding: 20px;
            border-radius: var(--border-radius);
            display: none;
            text-align: left;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .feedback.success { display: block; background-color: var(--success-light); border-left: 5px solid var(--success); color: #166534; }
        .feedback.error { display: block; background-color: var(--danger-light); border-left: 5px solid var(--primary); color: #991b1b; }
        
        .next-btn {
            margin-top: 20px;
            background-color: var(--text-color);
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            border-radius: var(--border-radius);
            cursor: pointer;
            width: 100%;
            display: none;
            font-weight: 700;
        }

        @media (max-width: 480px) { .fraud-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="score-board" id="level-display">Postup: 1 / 9</div>
        <h1>Detekce odkazů</h1>
        <p class="instructions">Je tato adresa bezpečná, nebo se jedná o podvod?</p>

        <div class="url-box" id="url-display">...</div>

        <div class="options-container" id="options-container">
            <button class="option-btn option-ok" data-category="ok">
                <span class="material-symbols-outlined">verified_user</span>
                <span>V pořádku</span>
                <small>Legitimní odkaz</small>
            </button>

            <div class="section-label">Hrozby</div>
            <div class="fraud-grid">
                <button class="option-btn" data-category="typo">
                    <span class="material-symbols-outlined">edit_notifications</span>
                    <span>Překlep</span>
                    <small>Typosquatting</small>
                </button>
                <button class="option-btn" data-category="domain">
                    <span class="material-symbols-outlined">language</span>
                    <span>Cizí doména</span>
                    <small>Falešný web</small>
                </button>
                <button class="option-btn" data-category="shortener">
                    <span class="material-symbols-outlined">link_off</span>
                    <span>Zkracovač</span>
                    <small>Skrytý cíl</small>
                </button>
                <button class="option-btn" data-category="malware">
                    <span class="material-symbols-outlined">warning</span>
                    <span>Malware</span>
                    <small>Nebezpečný soubor</small>
                </button>
            </div>
        </div>

        <div class="feedback" id="feedback"></div>
        <button class="next-btn" id="next-btn">Další adresa</button>
    </div>

            {

                category: "shortener",
                tip: "Toto už tak jednoduché nebylo, stále je ale třeba pamatovat, že hlavní doména se nachází v poslední části URL a je tedy schovaná za zkracovačem."
            },
            {
                url: "csob-overeni.online",
                category: "domain",
                tip: "Banka by nikdy nepoužila pro své kritické systémy podivnou koncovku jako .online. Vždy si hlídá svou hlavní doménu."
            },
            {
                url: "csob.cz-----------login.com",
                category: "domain",
                tip: "Tzv. URL padding. Na mobilu se díky pomlčkám schová skutečná doména (.com) a uživatel vidí jen csob.cz na začátku."
            }

        let answered = false;
        let levelQueue = levels.map((_, i) => i);
        let currentQueuePosition = 0;

        const urlDisplayEl = document.getElementById('url-display');
        const feedbackEl = document.getElementById('feedback');
        const levelDisplayEl = document.getElementById('level-display');
        const nextBtn = document.getElementById('next-btn');
        const optionButtons = document.querySelectorAll('.option-btn');

        function loadLevel() {
            answered = false;
            feedbackEl.style.display = 'none';
            nextBtn.style.display = 'none';

            levelDisplayEl.innerText = `Postup: ${currentQueuePosition + 1} / ${levelQueue.length}`;

            const levelIndex = levelQueue[currentQueuePosition];
            const level = levels[levelIndex];
            urlDisplayEl.innerText = level.url;

            optionButtons.forEach(btn => {
                btn.classList.remove('correct', 'wrong');
                btn.disabled = false;
            });
        }

        optionButtons.forEach(button => {
            button.addEventListener('click', () => {
                if (answered) return;
                answered = true;

                const selectedCategory = button.getAttribute('data-category');
                const levelIndex = levelQueue[currentQueuePosition];
                const level = levels[levelIndex];

                optionButtons.forEach(btn => btn.disabled = true);

                if (selectedCategory === level.category) {
                    button.classList.add('correct');
                    feedbackEl.className = 'feedback success';
                    feedbackEl.innerHTML = `<strong>Správně!</strong><br>${level.tip}`;
                } else {
                    button.classList.add('wrong');
                    levelQueue.push(levelIndex); // Přidá chybnou úroveň na konec
                    
                    // Zvýrazní správné tlačítko
                    optionButtons.forEach(btn => {
                        if (btn.getAttribute('data-category') === level.category) {
                            btn.classList.add('correct');
                        }
                    });

                    feedbackEl.className = 'feedback error';
                    feedbackEl.innerHTML = `<strong>Pozor!</strong><br>${level.tip}`;
                }

                feedbackEl.style.display = 'block';
                nextBtn.style.display = 'block';
                nextBtn.innerText = (currentQueuePosition + 1 === levelQueue.length) ? "Dokončit školení" : "Další adresa";
            });
        });

        nextBtn.onclick = () => {
            currentQueuePosition++;
            if (currentQueuePosition < levelQueue.length) {
                loadLevel();
            } else {
                document.getElementById('options-container').style.display = 'none';
                urlDisplayEl.style.display = 'none';
                nextBtn.style.display = 'none';
                feedbackEl.className = 'feedback success';
                feedbackEl.innerHTML = `<strong>Výborně!</strong><br>Podařilo se Vám odhalit všechny typy podvodů.<br><br><strong>FLAG(NaOdkazSeNenachytam)</strong>`;
                levelDisplayEl.innerText = "Trénink dokončen!";
            }
        };

        loadLevel();
    </script>
