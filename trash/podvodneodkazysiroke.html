<!DOCTYPE html>
<html lang="cs">

<head>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detekce podvodných odkazů | VUT</title>
    <style>
        /* --- FONT DEFINITIONS --- */
        @font-face {
            font-family: 'VafleVUT';
            src: url('./fonts/VAFLE_VUT_LIGHT.OTF') format('opentype');
            font-weight: 300;
        }

        @font-face {
            font-family: 'VafleVUT';
            src: url('./fonts/VAFLE_VUT_REGULAR.OTF') format('opentype');
            font-weight: 400;
        }

        @font-face {
            font-family: 'VafleVUT';
            src: url('./fonts/VAFLE_VUT_BOLD.OTF') format('opentype');
            font-weight: 700;
        }

        :root {
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --text-color: #1a1a1a;
            --primary: #E50000;
            --primary-hover: #CC0000;
            --success: #27ae60;
            --success-light: #f0fdf4;
            --danger-light: #fef2f2;
        }

        body {
            font-family: 'VafleVUT', 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
            margin: 0;
            padding: 20px;
        }

        /* --- Kompaktní layout --- */
        .container {
            background-color: var(--card-bg);
            padding: 20px 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            max-width: 900px;
            width: 100%;
            text-align: center;
            border-top: 5px solid var(--primary);
        }

        h1 {
            font-size: 22px;
            margin: 0 0 5px 0;
        }

        .instructions {
            font-size: 14px;
            margin-bottom: 15px;
        }

        .url-box {
            background-color: #f8f9fa;
            border: 2px solid #eaeaea;
            border-radius: var(--border-radius);
            padding: 15px;
            margin-bottom: 20px;
            font-family: 'Consolas', monospace;
            font-size: 22px;
            /* URL musí být čitelné */
            font-weight: bold;
            color: #000;
        }

        /* --- Horizontální Grid systém --- */
        .options-layout {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            /* Vlevo OK, vpravo zbytek */
            gap: 10px;
            align-items: stretch;
        }


        .option-btn {
            background-color: #fff;
            border: 1px solid #e0e0e0;
            padding: 10px 5px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            border-radius: var(--border-radius);
            transition: all 0.2s;
            height: 100%;
        }

        .option-btn .material-symbols-outlined {
            font-size: 24px;
            color: #666;
        }

        .option-btn span {
            font-size: 13px;
            font-weight: 600;
        }

        .option-btn small {
            font-size: 9px;
            opacity: 0.7;
            text-transform: uppercase;
        }

        /* Vizuální odlišení bezpečné zóny na hover */
        .option-btn.option-ok:hover:not(:disabled) {
            border-color: #27ae60;
            /* Zelená pro OK */
            background-color: #f0fff4;
        }

        .option-btn.option-ok:hover:not(:disabled) .material-symbols-outlined {
            color: #27ae60;
        }

        /* Vizuální odlišení podvodné zóny na hover */
        .option-btn:not(.option-ok):hover:not(:disabled) {
            border-color: var(--primary);
            /* Červená pro podvody */
            background-color: #fffafa;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .option-btn:not(.option-ok):hover:not(:disabled) .material-symbols-outlined {
            color: var(--primary);
        }

        /* Responzivita pro menší okna */
        @media (max-width: 800px) {
            .options-layout {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* FEEDBACK BOX */
        .feedback {
            margin-top: 25px;
            padding: 20px;
            border-radius: var(--border-radius);
            display: none;
            text-align: left;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .feedback.success {
            display: block;
            background-color: var(--success-light);
            border-left: 5px solid var(--success);
            color: #166534;
        }

        .feedback.error {
            display: block;
            background-color: var(--danger-light);
            border-left: 5px solid var(--primary);
            color: #991b1b;
        }

        .next-btn {
            margin-top: 20px;
            background-color: var(--text-color);
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            border-radius: var(--border-radius);
            cursor: pointer;
            width: 100%;
            display: none;
            font-weight: 700;
        }

        @media (max-width: 480px) {
            .fraud-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h1>Detekce odkazů</h1>
            <div id="level-display" style="font-weight: bold; color: var(--primary); font-size: 14px;">Postup: 1 / 9
            </div>
        </div>

        <p class="instructions">Prohlédněte si níže uvedenou URL adresu a rozhodněte, o jaký typ odkazu se jedná.
            Kliknutím na příslušnou kategorii ověříte svůj tip.</p>

        <div class="url-box" id="url-display">Nahrávám...</div>

        <div class="options-layout" id="options-container">
            <button class="option-btn option-ok" data-category="ok">
                <span class="material-symbols-outlined">check_circle</span>
                <span>V pořádku</span>
                <small>Legitimní</small>
            </button>
            <button class="option-btn" data-category="typo">
                <span class="material-symbols-outlined">spellcheck</span>
                <span>Překlep</span>
                <small>Záměna</small>
            </button>
            <button class="option-btn" data-category="domain">
                <span class="material-symbols-outlined">public_off</span>
                <span>Doména</span>
                <small>Cizí adresa</small>
            </button>
            <button class="option-btn" data-category="shortener">
                <span class="material-symbols-outlined">link_off</span>
                <span>Zkracovač</span>
                <small>Skrytý cíl</small>
            </button>
            <button class="option-btn" data-category="malware">
                <span class="material-symbols-outlined">bug_report</span>
                <span>Malware</span>
                <small>Přípona</small>
            </button>

        </div>

        <div class="feedback" id="feedback"></div>
        <button class="next-btn" id="next-btn">Další adresa</button>
    </div>

                tip: "V pořádku. VUT oficiálně používá i tuto kratší doménu (často pro weby fakult nebo hlavní rozcestník)."
            },

            },
            {

                category: "ok",
                tip: "Tato adresa je naprosto v pořádku."
            },

                category: "shortener",
                tip: "Zkracovače adres sice šetří místo, ale ve firemním e-mailu jsou nebezpečné, protože schovávají skutečný cíl odkazu. Více se o nich dozvíte v dalším úkolu."

                category: "domain",
                tip: "Tohle je finta s klamavou subdoménou. Lidé čtou zleva doprava a vidí 'idnes.cz', ale skutečná doména je až část před koncem: 'overeni-prihlaseni.com'."
            },

                category: "typo",
                tip: "Místo malého 'l' (el) bylo v názvu použito velké 'I' (i). Častý trik u známých značek."
            },
            {
                url: "netflix-platba.com",
                category: "domain",
                tip: "Technika zvaná Combosquatting. Útočník vezme známé jméno a přidá k němu slovo jako 'platba' nebo 'podpora', aby vyvolal důvěru."
            },
            {
                url: "https://google.com/bit.ly/login",
                category: "shortener",
                tip: "Toto už tak jednoduché nebylo, stále je ale třeba pamatovat, že hlavní doména se nachází v poslední části URL a je tedy schovaná za zkracovačem."
            },
            {
                url: "csob-overeni.online",
                category: "domain",
                tip: "Banka by nikdy nepoužila pro své kritické systémy podivnou koncovku jako .online. Vždy si hlídá svou hlavní doménu."
            },
            {
                url: "csob.cz-----------login.com",
                category: "domain",
                tip: "Tzv. URL padding. Na mobilu se díky pomlčkám schová skutečná doména (.com) a uživatel vidí jen csob.cz na začátku."
            }
        ];


        let answered = false;
        let levelQueue = levels.map((_, i) => i);
        let currentQueuePosition = 0;

        const urlDisplayEl = document.getElementById('url-display');
        const feedbackEl = document.getElementById('feedback');
        const levelDisplayEl = document.getElementById('level-display');
        const nextBtn = document.getElementById('next-btn');
        const optionButtons = document.querySelectorAll('.option-btn');

        function loadLevel() {
            answered = false;
            feedbackEl.style.display = 'none';
            nextBtn.style.display = 'none';

            levelDisplayEl.innerText = `Postup: ${currentQueuePosition + 1} / ${levelQueue.length}`;

            const levelIndex = levelQueue[currentQueuePosition];
            const level = levels[levelIndex];
            urlDisplayEl.innerText = level.url;

            optionButtons.forEach(btn => {
                btn.classList.remove('correct', 'wrong');
                btn.disabled = false;
            });
        }

        optionButtons.forEach(button => {
            button.addEventListener('click', () => {
                if (answered) return;
                answered = true;

                const selectedCategory = button.getAttribute('data-category');
                const levelIndex = levelQueue[currentQueuePosition];
                const level = levels[levelIndex];

                optionButtons.forEach(btn => btn.disabled = true);

                if (selectedCategory === level.category) {
                    button.classList.add('correct');
                    feedbackEl.className = 'feedback success';
                    feedbackEl.innerHTML = `<strong>Správně!</strong><br>${level.tip}`;
                } else {
                    button.classList.add('wrong');
                    levelQueue.push(levelIndex); // Přidá chybnou úroveň na konec

                    // Zvýrazní správné tlačítko
                    optionButtons.forEach(btn => {
                        if (btn.getAttribute('data-category') === level.category) {
                            btn.classList.add('correct');
                        }
                    });

                    feedbackEl.className = 'feedback error';
                    feedbackEl.innerHTML = `<strong>Pozor!</strong><br>${level.tip}`;
                }

                feedbackEl.style.display = 'block';
                nextBtn.style.display = 'block';
                nextBtn.innerText = (currentQueuePosition + 1 === levelQueue.length) ? "Dokončit školení" : "Další adresa";
            });
        });

        nextBtn.onclick = () => {
            currentQueuePosition++;
            if (currentQueuePosition < levelQueue.length) {
                loadLevel();
            } else {
                document.getElementById('options-container').style.display = 'none';
                urlDisplayEl.style.display = 'none';
                nextBtn.style.display = 'none';
                feedbackEl.className = 'feedback success';
                feedbackEl.innerHTML = `<strong>Výborně!</strong><br>Podařilo se Vám odhalit všechny typy podvodů.<br><br><strong>FLAG(NaOdkazSeNenachytam)</strong>`;
                levelDisplayEl.innerText = "Trénink dokončen!";
            }
        };

        loadLevel();
    </script>
</body>

</html>
