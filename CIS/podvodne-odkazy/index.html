<!DOCTYPE html>
<html lang="cs">

<head>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detekce podvodných odkazů | VUT</title>
    <style>
        /* --- FONT DEFINITIONS --- */
        @font-face {
            font-family: 'VafleVUT';
            src: url('./fonts/VAFLE_VUT_LIGHT.OTF') format('opentype');
            font-weight: 300;
        }

        @font-face {
            font-family: 'VafleVUT';
            src: url('./fonts/VAFLE_VUT_REGULAR.OTF') format('opentype');
            font-weight: 400;
        }

        @font-face {
            font-family: 'VafleVUT';
            src: url('./fonts/VAFLE_VUT_BOLD.OTF') format('opentype');
            font-weight: 700;
        }

        :root {
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --text-color: #1a1a1a;
            --primary: #E50000;
            --primary-hover: #CC0000;
            --success: #27ae60;
            --success-light: #f0fdf4;
            --danger-light: #fef2f2;
        }

        body {
            font-family: 'VafleVUT', 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
            margin: 0;
            padding: 20px;
        }

        /* --- Kompaktní layout --- */
        .container {
            background-color: var(--card-bg);
            padding: 20px 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            max-width: 900px;
            width: 100%;
            text-align: center;
            overflow: hidden;
        }

        .progress-bar-wrap {
            position: relative;
            height: 5px;
            background-color: #eaeaea;
            margin: -20px -30px 20px -30px;
        }

        .progress-bar-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background-color: var(--primary);
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            width: 0%;
        }

        h1 {
            font-size: 22px;
            margin: 0 0 5px 0;
        }

        .instructions {
            font-size: 14px;
            margin-bottom: 15px;
        }

        .url-box {
            background-color: #f8f9fa;
            border: 2px solid #eaeaea;
            border-radius: var(--border-radius);
            padding: 15px;
            margin-bottom: 32px;
            font-family: 'Consolas', monospace;
            font-size: 22px;
            font-weight: bold;
            color: #000;
        }

        /* --- Horizontální Grid systém --- */
        .options-layout {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            /* Vlevo OK, vpravo zbytek */
            gap: 10px;
            align-items: stretch;
        }


        .option-btn {
            background-color: #fff;
            border: 1px solid #e0e0e0;
            padding: 10px 5px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            border-radius: var(--border-radius);
            transition: all 0.2s;
            height: 100%;
        }

        .option-btn .material-symbols-outlined {
            font-size: 24px;
            color: #666;
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }

        .option-btn span {
            font-size: 13px;
            font-weight: 600;
        }

        .option-btn small {
            font-size: 9px;
            opacity: 0.7;
            text-transform: uppercase;
        }

        /* Vizuální odlišení bezpečné zóny na hover */
        .option-btn.option-ok:hover:not(:disabled) {
            border-color: #27ae60;
            /* Zelená pro OK */
            background-color: #f0fff4;
        }

        .option-btn.option-ok:hover:not(:disabled) .material-symbols-outlined {
            color: #27ae60;
        }

        /* Vizuální odlišení podvodné zóny na hover */
        .option-btn:not(.option-ok):hover:not(:disabled) {
            border-color: var(--primary);
            /* Červená pro podvody */
            background-color: #fffafa;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .option-btn:not(.option-ok):hover:not(:disabled) .material-symbols-outlined {
            color: var(--primary);
        }

        /* Responzivita pro menší okna */
        @media (max-width: 800px) {
            .options-layout {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* FEEDBACK BOX */
        .feedback {
            margin-top: 25px;
            padding: 20px;
            border-radius: var(--border-radius);
            display: none;
            text-align: left;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .feedback.success {
            display: block;
            background-color: var(--success-light);
            border-left: 5px solid var(--success);
            color: #166534;
        }

        .feedback.error {
            display: block;
            background-color: var(--danger-light);
            border-left: 5px solid var(--primary);
            color: #991b1b;
        }

        .next-btn {
            margin-top: 20px;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            border-radius: var(--border-radius);
            cursor: pointer;
            width: 100%;
            display: none;
            font-weight: 700;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .next-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(229, 0, 0, 0.2);
        }

        .next-btn:active {
            transform: translateY(0) scale(0.98);
        }

        /* Správně/špatně tlačítko */
        .option-btn.correct,
        .option-ok.correct {
            background-color: var(--success) !important;
            border-color: var(--success) !important;
        }

        .option-btn.correct *,
        .option-ok.correct * {
            color: white !important;
        }

        .option-btn.wrong,
        .option-ok.wrong {
            background-color: var(--primary) !important;
            border-color: var(--primary) !important;
        }

        .option-btn.wrong *,
        .option-ok.wrong * {
            color: white !important;
        }

        @media (max-width: 480px) {
            .fraud-grid {
                grid-template-columns: 1fr;
            }
        }

        .url-highlight-danger {
            background-color: #fee2e2;
            color: #b91c1c;
            border-radius: 3px;
            padding: 0 2px;
            text-decoration: underline;
            text-decoration-color: #ef4444;
            text-decoration-thickness: 2px;
            animation: highlightPop 0.4s ease-out;
        }

        .url-highlight-ok {
            background-color: #dcfce7;
            color: #166534;
            border-radius: 3px;
            padding: 0 2px;
        }

        @keyframes highlightPop {
            0% {
                background-color: transparent;
            }

            40% {
                background-color: #fca5a5;
            }

            100% {
                background-color: #fee2e2;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="progress-bar"></div>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h1>Detekce odkazů</h1>
            <div id="level-display" style="font-weight: bold; color: var(--primary); font-size: 14px;">1 / 15</div>
        </div>

        <p class="instructions">Prohlédněte si níže uvedenou URL adresu a rozhodněte, o jaký typ odkazu se jedná.
            Kliknutím na příslušnou kategorii ověříte svůj tip.</p>

        <div class="url-box" id="url-display">Nahrávám...</div>

        <div class="options-layout" id="options-container">
            <button class="option-btn option-ok" data-category="ok">
                <span class="material-symbols-outlined">check_circle</span>
                <span>V pořádku</span>
                <small>Legitimní odkaz</small>
            </button>
            <button class="option-btn" data-category="typo">
                <span class="material-symbols-outlined">spellcheck</span>
                <span>Překlep</span>
                <small>Záměna znaků</small>
            </button>
            <button class="option-btn" data-category="domain">
                <span class="material-symbols-outlined">public_off</span>
                <span>Falešná doména</span>
                <small>Podvrhnutý web</small>
            </button>
            <button class="option-btn" data-category="shortener">
                <span class="material-symbols-outlined">link_off</span>
                <span>Zkracovač</span>
                <small>Skrytý cíl</small>
            </button>
            <button class="option-btn" data-category="malware">
                <span class="material-symbols-outlined">bug_report</span>
                <span>Malware</span>
                <small>Spustitelný soubor</small>
            </button>

        </div>

        <div class="feedback" id="feedback"></div>
        <button class="next-btn" id="next-btn">Další adresa</button>
    </div>

    <script>
        const levels = [
            {
                url: "vnt.cz",
                category: "typo",
                highlight: "n",
                tip: "Všimněte si písmene 'n' místo 'u'. Optický klam, který v rychlosti snadno přehlédnete."
            },
            {
                url: "is.vut-br.cz/dokumenty/nove_smernice.pdf.exe",
                category: "malware",
                highlight: ".exe",
                accepted: ["malware", "domain"],
                tip: "Dvojitá koncovka. Útočník spoléhá na to, že si všimnete '.pdf', ale ve skutečnosti spouštíte .exe program."
            },
            {
                url: "http://185.199.108.153/vut/login",
                category: "domain",
                highlight: "185.199.108.153",
                tip: "Použití přímé IP adresy místo doménového jména. Seriózní instituce pro přihlašování IP adresy takto nikdy nepoužívají."
            },
            {
                url: "bit.ly/vut-stipendium-2024",
                category: "shortener",
                highlight: "bit.ly",
                tip: "Zkracovače adres sice šetří místo, ale ve firemním e-mailu jsou nebezpečné, protože schovávají skutečný cíl odkazu. Více se o nich dozvíte v dalším úkolu."
            },
            {
                url: "ld.vut.cz",
                category: "typo",
                highlight: "ld",
                tip: "Záměna malého 'L' za velké 'I'. V adresním řádku vypadá 'ld' (jako ID) téměř identicky."
            },
            {
                url: "storage.googleapis.com/vut-is-zaloha/Cisco_VPN_klient.exe",
                category: "malware",
                highlight: ".exe",
                tip: "Zneužití důvěryhodné služby. Útočník nahrál virus na veřejný cloud Googlu. Adresa neobsahuje podvodnou doménu a snadno oklame i filtry."
            },
            {
                url: "id-vut.cz",
                category: "domain",
                highlight: "d-v",
                tip: "Podvodná doména. VUT používá doménu id.vut.cz, nikoliv verze s pomlčkami ani jinou koncovkou."
            },
            {
                url: "vut.cz/login",
                category: "ok",
                tip: "Naprosto legitimní cesta k přihlášení na hlavní doméně univerzity."
            },
            {
                url: "id.vut.cz@prihlaseni-student.com/login",
                category: "domain",
                highlight: "@",
                tip: "Trik se zavináčem (Basic Auth). Vše před zavináčem prohlížeč ignoruje jako uživatelské jméno. Skutečná doména je až 'prihlaseni-student.com'."
            },
            {
                url: "id.vut.cz.potvrzeni-studia.com",
                category: "domain",
                highlight: "potvrzeni-studia.com",
                tip: "Klasický podvod. Skutečná doména je 'potvrzeni-studia.com'. To, že je na začátku 'id.vut.cz', je jen trik se subdoménou."
            },
            {
                url: "id.vut.cz",
                category: "ok",
                tip: "Tohle je v pořádku. Jedná se o oficiální centrální autentizační službu VUT."
            },
            {
                url: "googIe.com",
                category: "typo",
                highlight: "I",
                tip: "Místo malého 'l' (el) bylo v názvu použito velké 'I' (i). Častý trik u známých značek."
            },
            {
                url: "netflix-platba.com",
                category: "domain",
                highlight: "netflix-platba.com",
                tip: "Technika zvaná Combosquatting. Útočník vezme známé jméno a přidá k němu slovo jako 'platba' nebo 'podpora', aby vyvolal důvěru."
            },
            {
                url: "https://google.com/tinyurl.com/login",
                category: "shortener",
                highlight: "tinyurl.com",
                tip: "Toto už tak jednoduché nebylo, stále je ale třeba pamatovat, že hlavní doména se nachází v poslední části URL a je tedy schovaná za zkracovačem."
            },
            {
                url: "vut.cz-----------login.com",
                category: "domain",
                highlight: "cz-----------login.com",
                tip: "Tzv. URL padding. Na mobilu se díky pomlčkám schová skutečná doména (cz-----------login.com) a uživatel vidí jen vut.cz na začátku."
            }
        ];


        let answered = false;
        let levelQueue = levels.map((_, i) => i);
        let currentQueuePosition = 0;

        const urlDisplayEl = document.getElementById('url-display');
        const feedbackEl = document.getElementById('feedback');
        const levelDisplayEl = document.getElementById('level-display');
        const nextBtn = document.getElementById('next-btn');
        const optionButtons = document.querySelectorAll('.option-btn, .option-ok');

        const progressBar = document.getElementById('progress-bar');

        function updateProgress() {
            const total = levelQueue.length;
            const done = currentQueuePosition;
            const pct = total === 0 ? 0 : Math.round((done / total) * 100);
            progressBar.style.width = pct + '%';
            levelDisplayEl.innerText = `${currentQueuePosition + 1} / ${total}`;
        }

        function renderUrl(url, highlight, isOk) {
            if (!highlight) {
                urlDisplayEl.innerText = url;
                return;
            }
            const idx = url.indexOf(highlight);
            if (idx === -1) {
                urlDisplayEl.innerText = url;
                return;
            }
            const before = url.slice(0, idx);
            const match = url.slice(idx, idx + highlight.length);
            const after = url.slice(idx + highlight.length);
            const cls = isOk ? 'url-highlight-ok' : 'url-highlight-danger';
            urlDisplayEl.innerHTML =
                escapeHtml(before) +
                `<span class="${cls}">${escapeHtml(match)}</span>` +
                escapeHtml(after);
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function loadLevel() {
            answered = false;
            feedbackEl.style.display = 'none';
            nextBtn.style.display = 'none';

            updateProgress();

            const levelIndex = levelQueue[currentQueuePosition];
            const level = levels[levelIndex];
            urlDisplayEl.innerText = level.url;

            optionButtons.forEach(btn => {
                btn.classList.remove('correct', 'wrong');
                btn.disabled = false;
            });
        }

        optionButtons.forEach(button => {
            button.addEventListener('click', () => {
                if (answered) return;
                answered = true;

                const selectedCategory = button.getAttribute('data-category');
                const levelIndex = levelQueue[currentQueuePosition];
                const level = levels[levelIndex];

                optionButtons.forEach(btn => btn.disabled = true);

                const accepted = level.accepted || [level.category];
                const isCorrect = accepted.includes(selectedCategory);

                // Zvýrazni URL po odpovědi
                renderUrl(level.url, level.highlight, level.category === 'ok');

                if (isCorrect) {
                    button.classList.add('correct');
                    // Zvýrazni zeleně i ostatní přijatelná tlačítka
                    optionButtons.forEach(btn => {
                        if (accepted.includes(btn.getAttribute('data-category')) && btn !== button) {
                            btn.classList.add('correct');
                        }
                    });
                    feedbackEl.className = 'feedback success';
                    feedbackEl.innerHTML = `<strong>Správně!</strong><br>${level.tip}`;
                } else {
                    button.classList.add('wrong');
                    levelQueue.push(levelIndex);

                    optionButtons.forEach(btn => {
                        if (accepted.includes(btn.getAttribute('data-category'))) {
                            btn.classList.add('correct');
                        }
                    });

                    feedbackEl.className = 'feedback error';
                    feedbackEl.innerHTML = `<strong>Pozor!</strong><br>${level.tip}`;
                }

                feedbackEl.style.display = 'block';
                nextBtn.style.display = 'block';
                nextBtn.innerText = (currentQueuePosition + 1 === levelQueue.length) ? "Dokončit školení" : "Další adresa";
            });
        });

        nextBtn.onclick = () => {
            currentQueuePosition++;
            if (currentQueuePosition < levelQueue.length) {
                loadLevel();
            } else {
                progressBar.style.width = '100%';
                document.getElementById('options-container').style.display = 'none';
                urlDisplayEl.style.display = 'none';
                nextBtn.style.display = 'none';
                feedbackEl.className = 'feedback success';
                feedbackEl.innerHTML = `<strong>Výborně!</strong><br>Podařilo se Vám odhalit všechny typy podvodů.<br><br><strong>FLAG(NaOdkazSeNenachytam)</strong>`;
                levelDisplayEl.innerText = "Hotovo!";
            }
        };

        loadLevel();
    </script>
</body>

</html>
