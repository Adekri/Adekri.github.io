<!DOCTYPE html>
<html lang="cs">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="style_modal.css" />
  <link rel="icon" href="images/icon.ico" />
  <title>Přihlášení k účtu</title>


</head>

<body>
  <div class="background">
    <div class="card">

      <div class="logo">
        <img src="images/logo.svg" alt="Microsoft">
      </div>

      <h1 id="header">Přihlásit se</h1>

      <form id="login-form">
        <input type="text" id="address" placeholder="E-mail, telefon nebo Skype" required />

        <div class="links">
          <p>Nemáte účet? <a>Vytvořte si ho!</a></p>
          <a>Nezdařil se přístup k účtu?</a>
        </div>

        <div class="buttons">
          <button type="button" class="secondary">Zpět</button>
          <button type="submit" class="primary">Další</button>
        </div>
      </form>

      <img id="ants" style="display: none;" src="images/ants.gif" alt="Divider">
      <div id="storno-link" class="links" style="display: none;padding: 30px 0px 30px 0px;">
        <a>Storno</a>
      </div>

    </div>


    <div class="login-options">
      <img class="key-icon" src="images/key.svg" alt="Key">
      Možnosti přihlášení
    </div>

  </div>


<!--Vlastní modal - stačí překopírovat toto a stylovací soubor style_modal.css-->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <div class="modal" id="infoModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content info-modal">

        <div class="info-header">
          INFORMACE
        </div>

        <div class="info-body" id="infoModalText">
          Text
        </div>

        <div class="info-footer">
          <button class="info-btn" data-bs-dismiss="modal">
            Rozumím
          </button>
        </div>

      </div>
    </div>
  </div>

  <script>
    function showInfoModal(text) {

      const textEl = document.getElementById("infoModalText")
      textEl.textContent = text

      const modalEl = document.getElementById("infoModal")
      const modal = new bootstrap.Modal(modalEl)

      modal.show()
    }
  </script>



  <script src="script.js"></script>

</body>

</html>
